<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Explorer - DNA Preview</title>
    <style>
        /* 1.1. DNA VISUAL - Paleta de Cores (OKLCH) */
        :root {
            --background: oklch(1 0 0);
            --foreground: oklch(0.129 0.042 264.695);
            --card: oklch(1 0 0);
            --primary: oklch(0.208 0.042 265.755);
            --primary-foreground: oklch(0.984 0.003 247.858);
            --secondary: oklch(0.968 0.007 247.896);
            --border: oklch(0.929 0.013 255.508);
            --radius: 0.625rem; /* 1.3. Padrão de 10px */
        }

        /* 1.2. Tipografia */
        body {
            font-family: sans-serif;
            font-weight: 500;
            font-size: 0.875rem; /* text-sm padrão */
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* 2.1. Estrutura de Layout (Sidebar + Content) */
        .sidebar {
            width: 250px;
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            background-color: var(--secondary); /* Fundo sutil */
        }

        /* 1.3. Padrão de Componentes - Card */
        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            max-width: 500px;
        }

        /* 1.3. Padrão de Componentes - Button */
        .btn-primary {
            background-color: var(--primary);
            color: var(--primary-foreground);
            padding: 0.5rem 1rem; /* h-9 px-4 */
            border: none;
            border-radius: calc(var(--radius) - 2px);
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        h1 { font-size: 1.25rem; margin-top: 0; }
        .sidebar-item { padding: 0.5rem; border-radius: 6px; cursor: pointer; }
        .sidebar-item:hover { background-color: var(--border); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="font-weight: bold; margin-bottom: 1rem;">Architecture Explorer</div>
        <nav class="sidebar-item">Início</nav>
        <nav class="sidebar-item">Simulações</nav>
        <nav class="sidebar-item">Configurações</nav>
    </aside>

    <main class="main-content">
        <div class="card">
            <h1>Bem-vindo ao Simulador</h1>
            <p>Este é um teste do DNA Visual para garantir a fidelidade do design.</p>
            <button class="btn-primary">Explorar Projetos</button>
        </div>
    </main>

</body>
</html>
